<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="favGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5C8A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" fill="#F8F9FA" rx="12"/>
  
  <!-- Molecular Structure -->
  <g transform="translate(32, 32)">
    <!-- Orbits -->
    <ellipse cx="0" cy="0" rx="24" ry="9" fill="none" stroke="#8B9DC3" stroke-width="1.5" opacity="0.6" transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="24" ry="9" fill="none" stroke="#8B9DC3" stroke-width="1.5" opacity="0.6" transform="rotate(20)"/>
    <ellipse cx="0" cy="0" rx="24" ry="9" fill="none" stroke="#8B9DC3" stroke-width="1.5" opacity="0.6" transform="rotate(60)"/>
    
    <!-- Central atom -->
    <circle cx="0" cy="0" r="10" fill="url(#favGrad)"/>
    <circle cx="0" cy="0" r="7" fill="#2E5C8A" opacity="0.8"/>
    
    <!-- Outer atoms -->
    <circle cx="0" cy="-16" r="5" fill="url(#favGrad)"/>
    <circle cx="14" cy="8" r="5" fill="url(#favGrad)"/>
    <circle cx="-14" cy="8" r="5" fill="url(#favGrad)"/>
    <circle cx="14" cy="-8" r="4" fill="#5A9FE8"/>
    <circle cx="-14" cy="-8" r="4" fill="#5A9FE8"/>
  </g>
</svg>
